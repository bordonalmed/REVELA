<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F1C22"/>
      <stop offset="1" stop-color="#1A2B32"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#E8DCC0" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#E8DCC0" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.40"/>
    </filter>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)"/>

  <!-- App frame -->
  <rect x="90" y="90" width="1020" height="720" rx="28" fill="url(#paper)" stroke="#E8DCC0" stroke-opacity="0.12" filter="url(#shadow)"/>

  <!-- Top bar -->
  <rect x="120" y="125" width="960" height="52" rx="18" fill="#E8DCC0" fill-opacity="0.06"/>
  <circle cx="155" cy="151" r="10" fill="#E8DCC0" fill-opacity="0.20"/>
  <circle cx="185" cy="151" r="10" fill="#E8DCC0" fill-opacity="0.14"/>
  <circle cx="215" cy="151" r="10" fill="#E8DCC0" fill-opacity="0.10"/>

  <!-- Content area -->
  <rect x="120" y="200" width="960" height="580" rx="22" fill="#0B1418" fill-opacity="0.45" stroke="#E8DCC0" stroke-opacity="0.10"/>

  <!-- BEFORE label -->
  <rect x="150" y="230" width="120" height="44" rx="12" fill="#000" fill-opacity="0.45"/>
  <text x="210" y="259" text-anchor="middle" font-family="Inter, system-ui, -apple-system, Segoe UI, Arial" font-size="18" fill="#FFFFFF" opacity="0.92">ANTES</text>

  <!-- Illustration: muted subject -->
  <g opacity="0.92">
    <rect x="170" y="300" width="860" height="400" rx="20" fill="#E8DCC0" fill-opacity="0.06"/>

    <!-- face silhouette -->
    <circle cx="430" cy="500" r="120" fill="#E8DCC0" fill-opacity="0.10"/>
    <rect x="365" y="602" width="130" height="120" rx="56" fill="#E8DCC0" fill-opacity="0.08"/>

    <!-- details: subtle -->
    <circle cx="395" cy="485" r="12" fill="#E8DCC0" fill-opacity="0.10"/>
    <circle cx="465" cy="485" r="12" fill="#E8DCC0" fill-opacity="0.10"/>
    <path d="M405 545 C430 565, 455 565, 480 545" stroke="#E8DCC0" stroke-opacity="0.10" stroke-width="10" stroke-linecap="round" fill="none"/>

    <!-- chart / notes -->
    <rect x="620" y="365" width="360" height="44" rx="14" fill="#E8DCC0" fill-opacity="0.06"/>
    <rect x="620" y="430" width="310" height="44" rx="14" fill="#E8DCC0" fill-opacity="0.05"/>
    <rect x="620" y="495" width="340" height="44" rx="14" fill="#E8DCC0" fill-opacity="0.04"/>
    <rect x="620" y="560" width="280" height="44" rx="14" fill="#E8DCC0" fill-opacity="0.04"/>
  </g>

  <!-- watermark -->
  <text x="1030" y="785" text-anchor="end" font-family="Inter, system-ui, -apple-system, Segoe UI, Arial" font-size="14" fill="#E8DCC0" opacity="0.35">imagem ilustrativa</text>
</svg>
